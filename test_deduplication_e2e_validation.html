<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>End-to-End Deduplication Workflow Validation</title>
    <script src="minesearch_v2/frontend/js/deduplication-engine.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .pass { color: #28a745; }
        .fail { color: #dc3545; }
        .info { color: #17a2b8; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .summary { background: #e9ecef; padding: 15px; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>End-to-End Deduplication Workflow Validation</h1>
    <p>This test validates the complete deduplication system from backend data processing to frontend display.</p>
    
    <div id="test-results"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const resultsDiv = document.getElementById('test-results');
            let allTests = [];
            let passedTests = 0;
            let totalTests = 0;
            
            function addTest(section, name, result, details = '') {
                totalTests++;
                const status = result ? 'PASS' : 'FAIL';
                if (result) passedTests++;
                
                allTests.push({
                    section,
                    name,
                    status,
                    details
                });
            }
            
            function createTestSection(title, content) {
                return `
                    <div class="test-section">
                        <h3>${title}</h3>
                        ${content}
                    </div>
                `;
            }
            
            try {
                // Section 1: Engine Initialization
                let section1Content = '<h4>Engine Initialization Tests</h4>';
                
                const engineExists = !!window.deduplicationEngine;
                addTest('Engine', 'Deduplication Engine Loaded', engineExists);
                section1Content += `<p class="${engineExists ? 'pass' : 'fail'}">✓ Engine exists: ${engineExists}</p>`;
                
                if (engineExists) {
                    window.deduplicationEngine.enableDebug();
                    const synonymMapsExist = !!window.deduplicationEngine.synonymMaps;
                    addTest('Engine', 'Synonym Maps Loaded', synonymMapsExist);
                    section1Content += `<p class="${synonymMapsExist ? 'pass' : 'fail'}">✓ Synonym maps loaded: ${synonymMapsExist}</p>`;
                    
                    const countrySynonyms = window.deduplicationEngine.synonymMaps.countries;
                    const canadaSynonymCorrect = countrySynonyms.canada && countrySynonyms.canada.includes('kanada');
                    addTest('Engine', 'Canada/Kanada Synonyms Configured', canadaSynonymCorrect);
                    section1Content += `<p class="${canadaSynonymCorrect ? 'pass' : 'fail'}">✓ Canada/Kanada synonyms: ${JSON.stringify(countrySynonyms.canada)}</p>`;
                }
                
                // Section 2: Core Deduplication Logic
                let section2Content = '<h4>Core Deduplication Logic Tests</h4>';
                
                if (engineExists) {
                    // Test basic deduplication
                    const basicTest = "Canada / Kanada / Canada / Kanada / Kanada";
                    const basicResult = window.deduplicationEngine.deduplicateValues(basicTest, 'country');
                    const basicCorrect = basicResult.includes('(') && basicResult !== basicTest;
                    addTest('Logic', 'Basic Deduplication', basicCorrect, `"${basicTest}" → "${basicResult}"`);
                    section2Content += `<p class="${basicCorrect ? 'pass' : 'fail'}">✓ Basic deduplication: "${basicResult}"</p>`;
                    
                    // Test frequency counting
                    const frequencyCorrect = basicResult.includes('Canada') && basicResult.includes('Kanada');
                    addTest('Logic', 'Frequency Counting', frequencyCorrect);
                    section2Content += `<p class="${frequencyCorrect ? 'pass' : 'fail'}">✓ Both values preserved with counts</p>`;
                    
                    // Test different field types
                    const statusTest = "Aktiv / Active / Geplant / Planned";
                    const statusResult = window.deduplicationEngine.deduplicateValues(statusTest, 'status');
                    const statusCorrect = statusResult.includes('(') && statusResult !== statusTest;
                    addTest('Logic', 'Status Field Deduplication', statusCorrect, `"${statusTest}" → "${statusResult}"`);
                    section2Content += `<p class="${statusCorrect ? 'pass' : 'fail'}">✓ Status field: "${statusResult}"</p>`;
                }
                
                // Section 3: Backend Data Processing Simulation
                let section3Content = '<h4>Backend Data Processing Simulation</h4>';
                
                // Simulate backend consolidated_results structure
                const mockBackendData = {
                    consolidated_results: [
                        {
                            mine_name: "Test Mine",
                            raw_fields: {
                                country: "Canada / Kanada / Canada",
                                mine_status: "Active / Aktiv / Active / Geplant"
                            },
                            consolidated_fields: {
                                country: "Canada / Kanada / Canada [gpt-4, claude-3, gemini]",
                                mine_status: "Active / Aktiv / Active / Geplant [gpt-4, claude-3, gemini, perplexity]"
                            }
                        }
                    ]
                };
                
                const backendStructureCorrect = mockBackendData.consolidated_results[0].raw_fields && 
                                               mockBackendData.consolidated_results[0].consolidated_fields;
                addTest('Backend', 'Data Structure Correct', backendStructureCorrect);
                section3Content += `<p class="${backendStructureCorrect ? 'pass' : 'fail'}">✓ Backend data structure with raw_fields and consolidated_fields</p>`;
                
                // Section 4: Frontend Integration Simulation
                let section4Content = '<h4>Frontend Integration Simulation</h4>';
                
                function detectFieldType(fieldName) {
                    const typeMapping = {
                        'country': 'country',
                        'land': 'country',
                        'mine_status': 'status',
                        'status': 'status',
                        'mineral': 'mineral'
                    };
                    const fieldLower = fieldName.toLowerCase();
                    if (typeMapping[fieldLower]) return typeMapping[fieldLower];
                    for (const [key, type] of Object.entries(typeMapping)) {
                        if (fieldLower.includes(key)) return type;
                    }
                    return 'general';
                }
                
                if (engineExists && backendStructureCorrect) {
                    const result = mockBackendData.consolidated_results[0];
                    let processedFields = {};
                    
                    // Simulate frontend processing for each field
                    for (const [field, rawValue] of Object.entries(result.raw_fields)) {
                        const consolidatedValue = result.consolidated_fields[field];
                        let deduplicatedValue = consolidatedValue;
                        
                        if (rawValue.includes(' / ')) {
                            const fieldType = detectFieldType(field);
                            deduplicatedValue = window.deduplicationEngine.deduplicateValues(rawValue, fieldType);
                            
                            // Add source references back
                            const sourcesMatch = consolidatedValue.match(/\[([^\]]+)\]$/);
                            if (sourcesMatch) {
                                deduplicatedValue += ' ' + sourcesMatch[0];
                            }
                        }
                        
                        processedFields[field] = deduplicatedValue;
                    }
                    
                    // Test country field processing
                    const countryProcessed = processedFields.country;
                    const countryCorrect = countryProcessed.includes('(') && countryProcessed.includes('[');
                    addTest('Frontend', 'Country Field Processing', countryCorrect, `"${countryProcessed}"`);
                    section4Content += `<p class="${countryCorrect ? 'pass' : 'fail'}">✓ Country: "${countryProcessed}"</p>`;
                    
                    // Test status field processing  
                    const statusProcessed = processedFields.mine_status;
                    const statusCorrect = statusProcessed.includes('(') && statusProcessed.includes('[');
                    addTest('Frontend', 'Status Field Processing', statusCorrect, `"${statusProcessed}"`);
                    section4Content += `<p class="${statusCorrect ? 'pass' : 'fail'}">✓ Status: "${statusProcessed}"</p>`;
                    
                    // Test field type detection
                    const fieldTypeCorrect = detectFieldType('country') === 'country' && 
                                           detectFieldType('mine_status') === 'status';
                    addTest('Frontend', 'Field Type Detection', fieldTypeCorrect);
                    section4Content += `<p class="${fieldTypeCorrect ? 'pass' : 'fail'}">✓ Field type detection working</p>`;
                }
                
                // Section 5: User Requirements Validation
                let section5Content = '<h4>User Requirements Validation</h4>';
                
                if (engineExists) {
                    // Test: "Canada/Kanada" → "Canada (3)/Kanada (2)"
                    const userTestInput = "Canada / Kanada / Canada / Kanada / Canada";
                    const userTestResult = window.deduplicationEngine.deduplicateValues(userTestInput, 'country');
                    
                    // Check if result shows unique values with counts
                    const hasUniqueValues = userTestResult.includes('Canada') && userTestResult.includes('Kanada');
                    const hasCounts = userTestResult.includes('(') && userTestResult.includes(')');
                    const isFormatted = userTestResult.includes(' / ');
                    
                    addTest('Requirements', 'Unique Values Preserved', hasUniqueValues);
                    addTest('Requirements', 'Occurrence Counts Shown', hasCounts);  
                    addTest('Requirements', 'Proper Formatting', isFormatted);
                    
                    section5Content += `<p class="${hasUniqueValues ? 'pass' : 'fail'}">✓ Unique values preserved: ${hasUniqueValues}</p>`;
                    section5Content += `<p class="${hasCounts ? 'pass' : 'fail'}">✓ Occurrence counts shown: ${hasCounts}</p>`;
                    section5Content += `<p class="${isFormatted ? 'pass' : 'fail'}">✓ Proper " / " formatting: ${isFormatted}</p>`;
                    section5Content += `<p class="info">Final result: "${userTestResult}"</p>`;
                    
                    // Test meets exact user requirement
                    const meetsRequirement = hasUniqueValues && hasCounts && isFormatted;
                    addTest('Requirements', 'Meets User Requirement', meetsRequirement);
                    section5Content += `<p class="${meetsRequirement ? 'pass' : 'fail'}"><strong>✓ Meets user requirement: ${meetsRequirement}</strong></p>`;
                }
                
                // Build final HTML
                let html = '';
                html += createTestSection('1. Engine Initialization', section1Content);
                html += createTestSection('2. Core Deduplication Logic', section2Content);
                html += createTestSection('3. Backend Data Processing', section3Content);
                html += createTestSection('4. Frontend Integration', section4Content);
                html += createTestSection('5. User Requirements Validation', section5Content);
                
                // Summary
                const successRate = Math.round((passedTests / totalTests) * 100);
                const summaryClass = successRate >= 90 ? 'pass' : successRate >= 70 ? 'info' : 'fail';
                
                html += `
                    <div class="summary">
                        <h3>Test Summary</h3>
                        <p class="${summaryClass}"><strong>${passedTests}/${totalTests} tests passed (${successRate}%)</strong></p>
                        ${successRate >= 90 ? '<p class="pass">🎉 System is working correctly!</p>' : 
                          successRate >= 70 ? '<p class="info">⚠️ Some issues need attention</p>' : 
                          '<p class="fail">❌ Critical issues found</p>'}
                    </div>
                `;
                
                // Detailed test results
                html += '<div class="test-section"><h3>Detailed Test Results</h3><pre>';
                allTests.forEach(test => {
                    const symbol = test.status === 'PASS' ? '✅' : '❌';
                    html += `${symbol} [${test.section}] ${test.name}: ${test.status}`;
                    if (test.details) html += ` - ${test.details}`;
                    html += '\n';
                });
                html += '</pre></div>';
                
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                resultsDiv.innerHTML = `<div class="test-section"><h3>Critical Error</h3><p class="fail">❌ Test execution failed: ${error.message}</p><pre>${error.stack}</pre></div>`;
            }
        });
    </script>
</body>
</html>
