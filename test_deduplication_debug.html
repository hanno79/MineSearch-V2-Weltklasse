<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Deduplication Debug Test</title>
    <script src="minesearch_v2/frontend/js/deduplication-engine.js"></script>
</head>
<body>
    <h1>Deduplication Engine Debug Test</h1>
    <div id="test-results"></div>
    
    <script>
        // Test the deduplication system
        console.log('Testing Deduplication Engine...');
        
        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, testing deduplication...');
            
            const resultsDiv = document.getElementById('test-results');
            let testResults = [];
            
            // Test 1: Check if deduplication engine exists
            testResults.push(`Deduplication Engine exists: ${window.deduplicationEngine ? 'YES' : 'NO'}`);
            testResults.push(`MineSearchDeduplication exists: ${window.MineSearchDeduplication ? 'YES' : 'NO'}`);
            
            if (window.deduplicationEngine) {
                // Enable debug mode
                window.deduplicationEngine.enableDebug();
                
                // Test 2: Basic deduplication
                const testValue = "Canada / Kanada / Canada / Kanada / Kanada";
                const result = window.deduplicationEngine.deduplicateValues(testValue, 'country');
                testResults.push(`Basic deduplication test: "${testValue}" → "${result}"`);
                
                // Test 3: Test with different field types
                const statusTest = "Aktiv / Active / Aktiv / Geplant / Planned";
                const statusResult = window.deduplicationEngine.deduplicateValues(statusTest, 'status');
                testResults.push(`Status deduplication test: "${statusTest}" → "${statusResult}"`);
                
                // Test 4: Field type detection
                function detectFieldType(fieldName) {
                    const typeMapping = {
                        'country': 'country',
                        'land': 'country', 
                        'country_name': 'country',
                        'region': 'region',
                        'province': 'region',
                        'state': 'region',
                        'quebec': 'region',
                        'status': 'status',
                        'mine_status': 'status',
                        'operation_status': 'status',
                        'mineral': 'mineral',
                        'commodity': 'mineral',
                        'primary_mineral': 'mineral',
                        'primary_commodity': 'mineral'
                    };
                    
                    const fieldLower = fieldName.toLowerCase();
                    
                    // Exakte Übereinstimmung
                    if (typeMapping[fieldLower]) {
                        return typeMapping[fieldLower];
                    }
                    
                    // Teilstring-Suche für zusammengesetzte Feldnamen
                    for (const [key, type] of Object.entries(typeMapping)) {
                        if (fieldLower.includes(key)) {
                            return type;
                        }
                    }
                    
                    return 'general';
                }
                
                testResults.push(`Field type detection - 'country': ${detectFieldType('country')}`);
                testResults.push(`Field type detection - 'mine_status': ${detectFieldType('mine_status')}`);
                testResults.push(`Field type detection - 'unknown_field': ${detectFieldType('unknown_field')}`);
                
                // Test 5: processConsolidatedFields function
                if (window.processConsolidatedFields) {
                    const testFields = {
                        'country': 'Canada / Kanada / Canada',
                        'mine_status': 'Active / Aktiv / Active',
                        'unknown_field': 'Value1 / Value2 / Value1'
                    };
                    
                    const processedFields = window.processConsolidatedFields(testFields);
                    testResults.push(`processConsolidatedFields test results:`);
                    for (const [field, value] of Object.entries(processedFields)) {
                        testResults.push(`  ${field}: "${value}"`);
                    }
                } else {
                    testResults.push('processConsolidatedFields function NOT FOUND');
                }
                
                // Cache stats
                const cacheStats = window.deduplicationEngine.getCacheStats();
                testResults.push(`Cache stats: size=${cacheStats.size}, hitRate=${cacheStats.hitRate}`);
                
            } else {
                testResults.push('ERROR: Deduplication engine not loaded!');
            }
            
            // Display results
            resultsDiv.innerHTML = `<pre>${testResults.join('\n')}</pre>`;
        });
    </script>
</body>
</html>
