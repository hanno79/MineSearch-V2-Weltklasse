name: Tests

on:
  push:
    branches: [ main, develop, "v*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('minesearch_v2/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r minesearch_v2/requirements.txt
        pip install uvicorn==0.32.0 fastapi==0.115.0 python-dotenv==1.0.1
    
    - name: Install Playwright browsers
      run: |
        pip install playwright
        playwright install chromium
    - name: Start backend in SAFE_MODE (port 8000)
      env:
        SAFE_MODE: "1"
      run: |
        nohup python -m uvicorn minesearch.main:app --host 0.0.0.0 --port 8000 >/dev/null 2>&1 &
        # Warten, bis Port 8000 bereit ist
        for i in {1..20}; do curl -sSf http://127.0.0.1:8000/static/index.html >/dev/null && break || sleep 1; done
        curl -sSf http://127.0.0.1:8000/static/index.html >/dev/null

    - name: UI smoke test (tabs)
      run: |
        node -v || (sudo apt-get update && sudo apt-get install -y nodejs npm)
        npm init -y >/dev/null 2>&1 || true
        npm i -D --silent playwright@1.47.2 >/dev/null 2>&1
        npx playwright install --with-deps chromium >/dev/null 2>&1 || true
        UI_BASE_URL='http://127.0.0.1:8000/static/index.html' node scripts/ui_smoke_test.js
    
    - name: Lint with ruff (disabled)
      if: false
      run: |
        ruff check minesearch_v2/backend minesearch_v2/tests
    
    - name: Format check with black (disabled)
      if: false
      run: |
        black --check minesearch_v2/backend minesearch_v2/tests
    
    - name: Type check with mypy (disabled)
      if: false
      run: |
        mypy minesearch_v2/backend --ignore-missing-imports
    
    - name: Run tests
      run: |
        python minesearch_v2/run_tests.py
    
    - name: Upload coverage reports
      if: always()
      uses: codecov/codecov-action@v3
      with:
        file: ./minesearch_v2/coverage.json
        flags: unittests
        name: codecov-umbrella
    
    - name: Archive coverage report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: minesearch_v2/htmlcov/
    
    - name: Check coverage threshold
      if: always()
      working-directory: minesearch_v2
      run: |
        coverage report --fail-under=70