name: Tests

on:
  push:
    branches: [ main, develop, "v*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('minesearch_v2/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r minesearch_v2/requirements.txt
    
    - name: Install Playwright browsers
      run: |
        pip install playwright
        playwright install chromium
    
    - name: Lint with ruff (disabled)
      if: false
      run: |
        ruff check minesearch_v2/backend minesearch_v2/tests
    
    - name: Format check with black (disabled)
      if: false
      run: |
        black --check minesearch_v2/backend minesearch_v2/tests
    
    - name: Type check with mypy (disabled)
      if: false
      run: |
        mypy minesearch_v2/backend --ignore-missing-imports
    
    - name: Run tests
      run: |
        python minesearch_v2/run_tests.py
    
    - name: Upload coverage reports
      if: always()
      uses: codecov/codecov-action@v3
      with:
        file: ./minesearch_v2/coverage.json
        flags: unittests
        name: codecov-umbrella
    
    - name: Archive coverage report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: minesearch_v2/htmlcov/
    
    - name: Check coverage threshold
      if: always()
      working-directory: minesearch_v2
      run: |
        coverage report --fail-under=70