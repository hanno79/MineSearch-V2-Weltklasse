<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Syntax Error Test</title>
</head>
<body>
    <h1>Testing JavaScript Syntax Errors in Details Buttons</h1>
    
    <script>
        function safeJSONStringify(str) {
            if (!str) return "''";
            return JSON.stringify(str);
        }
        
        function showModelDetails(modelId) {
            console.log('showModelDetails called with:', modelId);
            alert('showModelDetails called with: ' + modelId);
        }
        
        // Test the problematic patterns found in the analysis
        const testModelId = "openrouter:deepseek-chimera-free";
        
        console.log('=== Testing JavaScript Syntax Patterns ===');
        
        // Pattern 1: Correct usage
        try {
            const escapedModelId = safeJSONStringify(testModelId);
            console.log('✅ Pattern 1 (correct):', `showModelDetails(${escapedModelId})`);
            
            // This should work
            eval(`showModelDetails(${escapedModelId})`);
        } catch (e) {
            console.error('❌ Pattern 1 failed:', e.message);
        }
        
        // Pattern 2: Missing closing parenthesis (from test report)
        try {
            console.log('❌ Pattern 2 (broken):', `showModelDetails(${safeJSONStringify(testModelId)}`);
            
            // This should fail with "Unexpected end of input"
            eval(`showModelDetails(${safeJSONStringify(testModelId)}`);
        } catch (e) {
            console.error('❌ Pattern 2 failed (expected):', e.message);
            document.body.innerHTML += `<p style="color: red;">ERROR REPRODUCED: ${e.message}</p>`;
        }
        
        // Pattern 3: Test in actual HTML context
        const testHTML = `
            <button onclick="showModelDetails(${safeJSONStringify(testModelId)}"
                    data-model-id="${testModelId}">
                📊 Details (BROKEN)
            </button>
        `;
        
        console.log('Testing HTML pattern...');
        document.body.innerHTML += '<h2>Broken Button Test:</h2>';
        document.body.innerHTML += testHTML;
        
        // Pattern 4: Correct HTML
        const correctHTML = `
            <button onclick="showModelDetails(${safeJSONStringify(testModelId)})"
                    data-model-id="${testModelId}">
                📊 Details (CORRECT)
            </button>
        `;
        
        document.body.innerHTML += '<h2>Fixed Button Test:</h2>';
        document.body.innerHTML += correctHTML;
        
    </script>
</body>
</html>
