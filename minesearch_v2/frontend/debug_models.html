<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Debug Models Loading</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Debug: Models Loading Test</h1>
    
    <div class="debug">
        <h3>Test Results:</h3>
        <div id="test-results"></div>
    </div>
    
    <div class="debug">
        <h3>Model Selection Container:</h3>
        <div id="model-selection" style="border: 1px solid #ccc; padding: 10px; min-height: 200px;">
            Loading...
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        
        function log(message, type = 'info') {
            const results = document.getElementById('test-results');
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            results.appendChild(div);
            console.log(message);
        }

        function showEnhancedLoadingState(targetElement, message = 'Daten werden geladen...', showProgress = false) {
            const progressHTML = showProgress ? `
                <div style="width: 100%; background: #e9ecef; border-radius: 10px; margin-top: 15px; height: 6px;">
                    <div style="width: 0%; height: 100%; background: #4CAF50; border-radius: 10px; animation: loading-progress 2s ease-in-out infinite;"></div>
                </div>
                <style>
                @keyframes loading-progress {
                    0% { width: 0%; }
                    50% { width: 70%; }
                    100% { width: 0%; }
                }
                </style>
            ` : '';
            
            targetElement.innerHTML = `
                <div style="text-align: center; padding: 40px 20px; color: #666;">
                    <div style="display: inline-block; margin-bottom: 15px;">
                        <div style="width: 40px; height: 40px; border: 4px solid #e3e3e3; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                    </div>
                    <div style="font-size: 16px; font-weight: 500;">${message}</div>
                    ${progressHTML}
                </div>
                <style>
                @keyframes spin {
                    0% { transform: rotate(0deg); }
                    100% { transform: rotate(360deg); }
                }
                </style>
            `;
        }

        async function loadAvailableModels() {
            try {
                log('Starting loadAvailableModels()', 'info');
                
                const modelSelection = document.getElementById('model-selection');
                if (modelSelection) {
                    log('Found model-selection element', 'success');
                    showEnhancedLoadingState(modelSelection, 'Lade verfügbare KI-Modelle...', true);
                } else {
                    log('ERROR: model-selection element not found!', 'error');
                    return;
                }
                
                log(`Making API call to: ${API_BASE_URL}/api/models`, 'info');
                const response = await fetch(`${API_BASE_URL}/api/models`);
                log(`API Response status: ${response.status}`, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                log(`API Response data.success: ${data.success}`, data.success ? 'success' : 'error');
                log(`API Response models count: ${data.models ? Object.keys(data.models).length : 0}`, 'info');
                
                if (data.success && data.models) {
                    log('Processing models data...', 'info');
                    
                    // Gruppiere Modelle nach Provider
                    const modelsByProvider = {};
                    Object.entries(data.models).forEach(([modelId, modelInfo]) => {
                        const [provider, model] = modelId.split(':');
                        if (!modelsByProvider[provider]) {
                            modelsByProvider[provider] = [];
                        }
                        modelsByProvider[provider].push({ id: modelId, ...modelInfo });
                    });
                    
                    log(`Grouped into ${Object.keys(modelsByProvider).length} providers`, 'success');
                    
                    let html = '';
                    Object.entries(modelsByProvider).forEach(([provider, models]) => {
                        html += `<div style="margin-bottom: 15px;">
                            <label style="cursor: pointer; font-weight: bold; display: block; margin-bottom: 5px;">
                                <input type="checkbox" 
                                       id="provider_${provider}" 
                                       style="margin-right: 8px;">
                                <span style="text-transform: capitalize;">${provider}</span>
                                <span style="font-weight: normal; color: #666;">(${models.length} Modelle)</span>
                            </label>
                            <div style="margin-left: 20px; margin-top: 5px;">`;
                        
                        models.forEach(model => {
                            const isDefault = model.id === 'perplexity:sonar' || model.is_free;
                            const icon = model.is_free ? '🆓' : (model.supports_web_search ? '🌐' : '🤖');
                            const timeInfo = model.timeout > 120 ? ` (${Math.round(model.timeout/60)}+ Min)` : '';
                            
                            html += `
                                <label style="display: block; margin: 5px 0; cursor: pointer;">
                                    <input type="checkbox" name="model" value="${model.id}" 
                                           ${isDefault ? 'checked' : ''} 
                                           style="margin-right: 8px;">
                                    <span>${icon} ${model.name}${timeInfo}</span>
                                    <br>
                                    <small style="margin-left: 24px; color: #666;">${model.description}</small>
                                </label>
                            `;
                        });
                        
                        html += '</div></div>';
                    });
                    
                    log('Setting innerHTML with generated HTML...', 'info');
                    modelSelection.innerHTML = html;
                    log(`✅ ${Object.keys(data.models).length} Modelle erfolgreich geladen und angezeigt`, 'success');
                } else {
                    log('ERROR: Invalid API response structure', 'error');
                }
            } catch (error) {
                log(`ERROR in loadAvailableModels(): ${error.message}`, 'error');
                log(`Error stack: ${error.stack}`, 'error');
                
                const targetElement = document.getElementById('model-selection');
                if (targetElement) {
                    targetElement.innerHTML = `<div style="color: red; padding: 20px;">
                        <strong>Fehler beim Laden der Modelle:</strong><br>
                        ${error.message}
                    </div>`;
                }
            }
        }

        // Start the test when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            log('DOM loaded - starting test', 'info');
            setTimeout(() => {
                loadAvailableModels();
            }, 500);
        });
    </script>
</body>
</html>
