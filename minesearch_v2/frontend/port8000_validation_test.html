<!DOCTYPE html>
<html>
<head>
    <title>Port 8000 System Validation Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>🔍 Port 8000 System Validation</h1>
    <div id="results"></div>
    
    <script>
        async function runValidation() {
            const results = document.getElementById('results');
            
            function addResult(message, type = 'info') {
                const div = document.createElement('div');
                div.className = `test-result ${type}`;
                div.textContent = message;
                results.appendChild(div);
            }
            
            addResult('🚀 Starting Port 8000 System Validation...', 'info');
            
            // Test 1: Check if we can load deduplication engine
            try {
                const response = await fetch('/static/js/deduplication-engine.js');
                if (response.ok) {
                    const content = await response.text();
                    if (content.includes('Deduplizierung-Engine')) {
                        addResult('✅ Deduplication Engine JS loads successfully', 'success');
                    } else {
                        addResult('❌ Deduplication Engine JS loads but content is wrong', 'error');
                    }
                } else {
                    addResult(`❌ Deduplication Engine JS failed to load: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Deduplication Engine JS error: ${error.message}`, 'error');
            }
            
            // Test 2: Check CSS
            try {
                const response = await fetch('/static/style.css');
                if (response.ok) {
                    addResult('✅ CSS file loads successfully', 'success');
                } else {
                    addResult(`❌ CSS file failed to load: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ CSS file error: ${error.message}`, 'error');
            }
            
            // Test 3: Check consolidated results API
            try {
                const response = await fetch('/api/results/consolidated');
                if (response.ok) {
                    const data = await response.json();
                    if (data.success !== undefined) {
                        addResult('✅ Consolidated Results API responds correctly', 'success');
                    } else {
                        addResult('❌ Consolidated Results API response format is wrong', 'error');
                    }
                } else {
                    addResult(`❌ Consolidated Results API failed: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Consolidated Results API error: ${error.message}`, 'error');
            }
            
            // Test 4: Check model info API
            try {
                const response = await fetch('/api/models/info');
                if (response.ok) {
                    const data = await response.json();
                    addResult('✅ Models Info API responds correctly', 'success');
                } else {
                    addResult(`❌ Models Info API failed: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Models Info API error: ${error.message}`, 'error');
            }
            
            addResult('🎯 Validation Complete!', 'info');
        }
        
        // Run validation when page loads
        window.addEventListener('load', runValidation);
    </script>
</body>
</html>
