<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Escaping Test</title>
</head>
<body>
    <h1>Button Escaping Test für Model-IDs</h1>
    
    <div id="test-results"></div>
    
    <script>
        // SECURITY: Sichere JavaScript-String-Escaping für onclick-Handler
        function escapeJavaScriptString(str) {
            if (!str) return '';
            // Escape alle kritischen Zeichen für JavaScript-Strings
            return str
                .replace(/\\/g, '\\\\')    // Backslash zuerst escapen
                .replace(/'/g, "\\'")      // Single quotes escapen
                .replace(/"/g, '\\"')      // Double quotes escapen
                .replace(/\n/g, '\\n')     // Newlines escapen
                .replace(/\r/g, '\\r')     // Carriage returns escapen
                .replace(/\t/g, '\\t')     // Tabs escapen
                .replace(/\f/g, '\\f')     // Form feeds escapen
                .replace(/\v/g, '\\v')     // Vertical tabs escapen
                .replace(/\0/g, '\\0');    // Null bytes escapen
        }

        // SECURITY: Alternative Lösung - JSON.stringify für sichere String-Übergabe
        function safeJSONStringify(str) {
            if (!str) return "''";
            return JSON.stringify(str);
        }
        
        // Test-Funktionen
        function showModelDetails(modelId) {
            alert(`showModelDetails called with: ${modelId}`);
        }
        
        function showConsolidatedDetails(mineName, country) {
            alert(`showConsolidatedDetails called with: ${mineName}, ${country}`);
        }
        
        // Test problematische Model-IDs
        const testModelIds = [
            'grok:grok-3-mini',
            'grok:grok-2',
            'openai:gpt-3.5-turbo',
            'claude:claude-3-haiku',
            'test:model-with:many:colons',
            'provider:model-with"quotes',
            "provider:model-with'single-quotes",
            'provider:model\nwith\nnewlines'
        ];
        
        // Generiere Test-Buttons
        function runTests() {
            const container = document.getElementById('test-results');
            let html = '<h2>Test-Buttons (sollten alle funktionieren):</h2>';
            
            testModelIds.forEach((modelId, index) => {
                html += `
                    <div style="margin: 10px 0; padding: 10px; border: 1px solid #ccc;">
                        <h3>Test ${index + 1}: ${modelId}</h3>
                        
                        <!-- Original Problem (würde fehlschlagen) -->
                        <p><strong>Original Problem:</strong> onclick="showModelDetails('${modelId}')"</p>
                        <button onclick="alert('Würde fehlschlagen mit: ${modelId}')" 
                                style="background: #f44336; color: white; padding: 5px 10px;">
                            ❌ Original (fehlerhafte Syntax)
                        </button>
                        
                        <!-- Lösung 1: escapeJavaScriptString -->
                        <p><strong>Lösung 1:</strong> onclick="showModelDetails('${escapeJavaScriptString(modelId)}')"</p>
                        <button onclick="showModelDetails('${escapeJavaScriptString(modelId)}')" 
                                style="background: #2196F3; color: white; padding: 5px 10px;">
                            🔧 escapeJavaScriptString
                        </button>
                        
                        <!-- Lösung 2: safeJSONStringify -->
                        <p><strong>Lösung 2:</strong> onclick="showModelDetails(${safeJSONStringify(modelId)})"</p>
                        <button onclick="showModelDetails(${safeJSONStringify(modelId)})" 
                                style="background: #4CAF50; color: white; padding: 5px 10px;">
                            ✅ safeJSONStringify
                        </button>
                    </div>
                `;
            });
            
            // Test für konsolidierte Details
            html += `
                <div style="margin: 20px 0; padding: 10px; border: 2px solid #007bff;">
                    <h3>Test konsolidierte Details:</h3>
                    <button onclick="showConsolidatedDetails(${safeJSONStringify('Mine:With:Colons')}, ${safeJSONStringify('Country "With" Quotes')})" 
                            style="background: #007bff; color: white; padding: 10px 15px;">
                        🏭 Test konsolidierte Details
                    </button>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        // Tests beim Laden ausführen
        document.addEventListener('DOMContentLoaded', runTests);
    </script>
</body>
</html>
