<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>MineSearch 2.0 - Mining Recherche System</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <!-- Modular CSS -->
    <link rel="stylesheet" href="/static/style.css?v=2.0.1">
    <link rel="stylesheet" href="/static/css/tabs.css">
    <link rel="stylesheet" href="/static/css/forms.css">
    <link rel="stylesheet" href="/static/css/tables.css">
    <link rel="stylesheet" href="/static/css/charts.css">
</head>
<body>
    <div id="app">
        <!-- Header Component -->
        <header class="app-header">
            <h1>🔍 MineSearch 2.0 - Mining Recherche System</h1>
        </header>

        <!-- Main Navigation -->
        <nav id="main-navigation">
            <!-- Will be loaded by navigation.js -->
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Content will be dynamically loaded based on active tab -->
        </main>

        <!-- Results Area -->
        <section id="results-area" style="display: none;">
            <!-- Results will be injected here -->
        </section>

        <!-- Footer -->
        <footer class="app-footer">
            <p>MineSearch 2.0 - Entwickelt für effiziente Bergbau-Recherche</p>
        </footer>
    </div>

    <!-- Modular JavaScript -->
    <script src="/static/js/navigation.js"></script>
    <script src="/static/js/search-forms.js"></script>
    <script src="/static/js/results-display.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
