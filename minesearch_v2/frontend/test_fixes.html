<!DOCTYPE html>
<html>
<head>
    <title>Source Display Fix Test</title>
</head>
<body>
    <h1>Test der Source-Display-Fixes</h1>
    <div id="test-results"></div>
    
    <script>
        // Simuliere API-Response Struktur
        const testData = {
            success: true,
            data: {
                grouped_sources: [
                    {
                        domain: "usgs.gov",
                        count: 3,
                        avg_score: 55.0,
                        avg_success_rate: 61.5,
                        total_searches: 26
                    },
                    {
                        domain: "nrcan.gc.ca", 
                        count: 2,
                        avg_score: 47.5,
                        avg_success_rate: 50.0,
                        total_searches: 20
                    }
                ],
                total_domains: 2,
                total_sources: 5
            }
        };
        
        // Simuliere die gefixte displayGroupedSources Funktion
        function testDisplayFixes() {
            const { grouped_sources, total_domains, total_sources } = testData.data;
            
            let tableHtml = `
                <div class="sources-summary">
                    <strong>${total_domains} Domains</strong> mit insgesamt <strong>${total_sources} Quellen</strong>
                </div>
                <table border="1" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th>Domain</th>
                            <th>Dokumente</th>
                            <th>Ø Score</th>
                            <th>Erfolgsrate</th>
                            <th>Suchen</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            grouped_sources.forEach(source => {
                const averageScore = source.avg_score ? source.avg_score.toFixed(1) : 'N/A';
                // FIX: Verwende avg_success_rate statt success_rate
                const successRate = source.avg_success_rate ? (source.avg_success_rate).toFixed(1) + '%' : 'N/A';
                
                tableHtml += `
                    <tr>
                        <td><strong>${source.domain}</strong></td>
                        <td>${source.count}</td>
                        <td>${averageScore}</td>
                        <td>${successRate}</td>
                        <td>${source.total_searches || 0}</td>
                    </tr>
                `;
            });
            
            tableHtml += `</tbody></table>`;
            
            document.getElementById('test-results').innerHTML = tableHtml;
            
            // Zeige erwartete vs tatsächliche Werte
            console.log('Test Results:');
            console.log('usgs.gov - Erfolgsrate:', testData.data.grouped_sources[0].avg_success_rate + '%', '(erwartet: 61.5%)');
            console.log('usgs.gov - Suchen:', testData.data.grouped_sources[0].total_searches, '(erwartet: 26)');
            console.log('nrcan.gc.ca - Erfolgsrate:', testData.data.grouped_sources[1].avg_success_rate + '%', '(erwartet: 50.0%)');
            console.log('nrcan.gc.ca - Suchen:', testData.data.grouped_sources[1].total_searches, '(erwartet: 20)');
        }
        
        // Test ausführen
        testDisplayFixes();
    </script>
</body>
</html>
