<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik Frontend Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
        .loading { color: blue; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>🧪 Statistik Frontend Funktions-Test</h1>
    
    <div class="test-section">
        <h2>Test 1: API Erreichbarkeit</h2>
        <div id="api-test-result" class="loading">Teste API...</div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Statistik-Tabelle Rendering</h2>
        <div id="table-test-result" class="loading">Lade Statistiken...</div>
        <div id="statistics-table-container"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 3: Details Modal Test</h2>
        <div id="modal-test-result"></div>
        <button onclick="testDetailsModal()">Test Details Modal</button>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        // Test 1: API Erreichbarkeit
        async function testAPI() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/statistics/models/comprehensive`);
                const data = await response.json();
                
                if (data.success && data.data.models.length > 0) {
                    document.getElementById('api-test-result').innerHTML = 
                        `<span class="success">✅ API funktioniert - ${data.data.models.length} Modelle gefunden</span>`;
                    return data;
                } else {
                    document.getElementById('api-test-result').innerHTML = 
                        `<span class="error">❌ API gibt keine Modelle zurück</span>`;
                    return null;
                }
            } catch (error) {
                document.getElementById('api-test-result').innerHTML = 
                    `<span class="error">❌ API Fehler: ${error.message}</span>`;
                return null;
            }
        }

        // Test 2: Statistik-Tabelle Rendering
        async function testTableRendering() {
            const data = await testAPI();
            if (!data) return;

            try {
                const models = data.data.models;
                
                let tableHTML = `
                    <h3>📊 Modell-Performance Statistiken (${models.length} Modelle)</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Modell</th>
                                <th>Provider</th>
                                <th>Overall Score</th>
                                <th>Success Rate</th>
                                <th>Kategorie</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                models.forEach((model, index) => {
                    const modelName = model.model_name.length > 50 ? 
                        model.model_name.substring(0, 50) + '...' : 
                        model.model_name;
                        
                    tableHTML += `
                        <tr>
                            <td>${modelName}</td>
                            <td>${model.provider}</td>
                            <td>${model.overall_score}</td>
                            <td>${model.success_rate_percent}%</td>
                            <td>${model.score_category}</td>
                            <td><button onclick="showModelDetails('${model.model_id}')">Details</button></td>
                        </tr>
                    `;
                });

                tableHTML += '</tbody></table>';
                
                document.getElementById('statistics-table-container').innerHTML = tableHTML;
                document.getElementById('table-test-result').innerHTML = 
                    `<span class="success">✅ Statistik-Tabelle erfolgreich gerendert</span>`;
                    
            } catch (error) {
                document.getElementById('table-test-result').innerHTML = 
                    `<span class="error">❌ Tabellen-Rendering Fehler: ${error.message}</span>`;
            }
        }

        // Test 3: Details Modal
        function testDetailsModal() {
            const modalHTML = `
                <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                           background: rgba(0,0,0,0.5); z-index: 1000;" onclick="closeModal()">
                    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                               background: white; padding: 20px; border-radius: 8px; max-width: 600px; width: 90%;" 
                         onclick="event.stopPropagation()">
                        <h3>🔍 Modell Details Test</h3>
                        <p>Dies ist ein Test des Details-Modal-Fensters.</p>
                        <p>In einer echten Implementierung würden hier detaillierte Statistiken angezeigt.</p>
                        <button onclick="closeModal()">Schließen</button>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            document.getElementById('modal-test-result').innerHTML = 
                `<span class="success">✅ Details Modal funktioniert</span>`;
        }

        function closeModal() {
            const modals = document.querySelectorAll('div[style*="position: fixed"]');
            modals.forEach(modal => modal.remove());
        }

        function showModelDetails(modelId) {
            alert(`Details für Modell: ${modelId}\n\nIn der echten Anwendung würde hier ein detailliertes Modal geöffnet.`);
        }

        // Starte Tests automatisch
        window.onload = function() {
            setTimeout(testTableRendering, 1000);
        };
    </script>
</body>
</html>
