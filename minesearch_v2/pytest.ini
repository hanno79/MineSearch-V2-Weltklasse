# pytest Konfiguration für MineSearch v2
# Author: rahn
# Datum: 01.07.2025

[tool:pytest]
# Test-Verzeichnis
testpaths = tests

# Python-Dateien die als Tests erkannt werden
python_files = test_*.py

# Test-Klassen
python_classes = Test*

# Test-Funktionen
python_functions = test_*

# Coverage-Optionen
addopts = 
    --cov=backend
    --cov-report=html
    --cov-report=term-missing
    --cov-report=json
    --cov-fail-under=70
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Marker für verschiedene Test-Typen
markers =
    unit: Unit Tests
    integration: Integration Tests
    slow: Langsame Tests
    api: API Tests
    skip_if_no_api_key: Tests die API Key benötigen

# Coverage-Konfiguration
[coverage:run]
source = backend
omit = 
    */tests/*
    */test_*
    */__init__.py
    */config.py

[coverage:report]
precision = 2
skip_covered = False
show_missing = True

[coverage:html]
directory = htmlcov

[coverage:json]
output = coverage.json