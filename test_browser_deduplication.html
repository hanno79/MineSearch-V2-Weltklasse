<!DOCTYPE html>
<html>
<head>
    <title>Test Browser Deduplication with Real API</title>
    <script src="minesearch_v2/frontend/js/deduplication-engine.js"></script>
</head>
<body>
    <h1>Real API Deduplication Test</h1>
    <button onclick="testRealAPI()">Test Real API Data</button>
    <button onclick="enableDebugMode()">Enable Debug Mode</button>
    <div id="test-results"></div>
    
    <script>
        function enableDebugMode() {
            if (window.deduplicationEngine) {
                window.deduplicationEngine.enableDebug();
                console.log('🐛 Debug mode enabled');
                document.getElementById('test-results').innerHTML += '<p style="color: green;">Debug mode enabled - check console</p>';
            }
        }
        
        // Copy the detectFieldType function from the main app
        function detectFieldType(fieldName) {
            const typeMapping = {
                'country': 'country',
                'land': 'country', 
                'country_name': 'country',
                'region': 'region',
                'province': 'region',
                'state': 'region',
                'quebec': 'region',
                'status': 'status',
                'mine_status': 'status',
                'operation_status': 'status',
                'mineral': 'mineral',
                'commodity': 'mineral',
                'primary_mineral': 'mineral',
                'primary_commodity': 'mineral'
            };
            
            const fieldLower = fieldName.toLowerCase();
            
            // Exakte Übereinstimmung
            if (typeMapping[fieldLower]) {
                return typeMapping[fieldLower];
            }
            
            // Teilstring-Suche für zusammengesetzte Feldnamen
            for (const [key, type] of Object.entries(typeMapping)) {
                if (fieldLower.includes(key)) {
                    return type;
                }
            }
            
            return 'general';
        }
        
        async function testRealAPI() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<p>🔄 Loading real API data...</p>';
            
            try {
                // Call the real consolidated results API
                const response = await fetch('/api/consolidated-results');
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }
                
                const data = await response.json();
                
                let html = '<h2>Real API Test Results</h2>';
                html += `<p>📊 Total results: ${data.results ? data.results.length : 'N/A'}</p>`;
                
                if (data.results && data.results.length > 0) {
                    const firstResult = data.results[0];
                    
                    html += '<h3>First Result Analysis:</h3>';
                    html += `<p><strong>Mine:</strong> ${firstResult.mine_name}</p>`;
                    html += `<p><strong>Has raw_fields:</strong> ${!!firstResult.raw_fields}</p>`;
                    html += `<p><strong>Has consolidated_fields:</strong> ${!!firstResult.consolidated_fields}</p>`;
                    
                    if (firstResult.raw_fields) {
                        html += '<h4>Raw Fields (for deduplication):</h4>';
                        for (const [field, value] of Object.entries(firstResult.raw_fields)) {
                            if (value && value.includes(' / ')) {
                                html += `<p><strong>${field}:</strong> ${value}</p>`;
                                
                                // Test deduplication on this field
                                if (window.deduplicationEngine) {
                                    const fieldType = detectFieldType(field);
                                    const deduplicated = window.deduplicationEngine.deduplicateValues(value, fieldType);
                                    html += `<p style="background: #e8f5e8; padding: 5px; margin: 5px 0;"><strong>Deduplicated:</strong> ${deduplicated}</p>`;
                                }
                            }
                        }
                    }
                    
                    if (firstResult.consolidated_fields) {
                        html += '<h4>Consolidated Fields (with sources):</h4>';
                        const sampleFields = Object.entries(firstResult.consolidated_fields).slice(0, 3);
                        for (const [field, value] of sampleFields) {
                            html += `<p><strong>${field}:</strong> ${value}</p>`;
                        }
                    }
                } else {
                    html += '<p style="color: red;">❌ No results found in API response</p>';
                }
                
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                resultsDiv.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
                console.error('API Test Error:', error);
            }
        }
        
        // Auto-run test when page loads
        document.addEventListener('DOMContentLoaded', function() {
            if (window.deduplicationEngine) {
                console.log('✅ Deduplication engine loaded');
            } else {
                console.log('❌ Deduplication engine NOT loaded');
            }
        });
    </script>
</body>
</html>
