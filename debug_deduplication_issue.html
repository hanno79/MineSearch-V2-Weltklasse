<!DOCTYPE html>
<html>
<head>
    <title>Debug Deduplication Issue</title>
    <script src="minesearch_v2/frontend/js/deduplication-engine.js"></script>
</head>
<body>
    <h1>Debug: Why Deduplication Isn't Working</h1>
    <div id="debug-output"></div>
    
    <script>
        // Simulate the exact data structure from backend
        const simulatedResult = {
            mine_name: "Test Mine",
            raw_fields: {
                country: "Canada / Kanada / Canada / Canada / Kanada"
            },
            consolidated_fields: {
                country: "Canada [gpt-4] / Kanada [claude-3] / Canada [gpt-4] / Canada [gemini] / Kanada [claude-3]"
            }
        };
        
        // Simulate the detectFieldType function
        function detectFieldType(fieldName) {
            const typeMapping = {
                'country': 'country',
                'land': 'country', 
                'country_name': 'country',
                'region': 'region',
                'province': 'region',
                'state': 'region',
                'quebec': 'region',
                'status': 'status',
                'mine_status': 'status',
                'operation_status': 'status',
                'mineral': 'mineral',
                'commodity': 'mineral',
                'primary_mineral': 'mineral',
                'primary_commodity': 'mineral'
            };
            
            const fieldLower = fieldName.toLowerCase();
            
            // Exakte Übereinstimmung
            if (typeMapping[fieldLower]) {
                return typeMapping[fieldLower];
            }
            
            // Teilstring-Suche für zusammengesetzte Feldnamen
            for (const [key, type] of Object.entries(typeMapping)) {
                if (fieldLower.includes(key)) {
                    return type;
                }
            }
            
            return 'general';
        }
        
        function debugDeduplication() {
            const debugDiv = document.getElementById('debug-output');
            let html = '<h2>Deduplication Debug Analysis</h2>';
            
            // Step 1: Check if engine is loaded
            html += '<h3>1. Engine Loading Check</h3>';
            if (typeof window.deduplicationEngine !== 'undefined') {
                html += '<p style="color: green;">✅ Deduplication engine is loaded</p>';
            } else {
                html += '<p style="color: red;">❌ Deduplication engine NOT loaded!</p>';
                debugDiv.innerHTML = html;
                return;
            }
            
            // Step 2: Test the exact logic from displayConsolidatedResults
            html += '<h3>2. Exact Frontend Logic Simulation</h3>';
            
            const field = 'country';
            const result = simulatedResult;
            
            // This is the exact code from displayConsolidatedResults (lines 6577-6586)
            let rawFieldValue = (result.raw_fields && result.raw_fields[field]) || '';
            let fieldValue = result.consolidated_fields[field] || '';
            let deduplicatedValue = fieldValue;
            
            html += `<p><strong>Raw Field Value:</strong> "${rawFieldValue}"</p>`;
            html += `<p><strong>Consolidated Field Value:</strong> "${fieldValue}"</p>`;
            html += `<p><strong>Contains ' / ':</strong> ${rawFieldValue.includes(' / ')}</p>`;
            html += `<p><strong>Engine Available:</strong> ${!!window.deduplicationEngine}</p>`;
            
            // Intelligente Deduplizierung mit Synonym-Erkennung anwenden
            if (rawFieldValue.includes(' / ') && window.deduplicationEngine) {
                html += '<p style="color: blue;">🔄 Applying deduplication...</p>';
                
                const fieldType = detectFieldType(field);
                const originalValue = rawFieldValue;
                deduplicatedValue = window.deduplicationEngine.deduplicateValues(rawFieldValue, fieldType);
                
                html += `<p><strong>Field Type:</strong> ${fieldType}</p>`;
                html += `<p><strong>Original Value:</strong> "${originalValue}"</p>`;
                html += `<p><strong>Deduplicated Value:</strong> "${deduplicatedValue}"</p>`;
                
                // Füge Quellen-Information hinzu wenn verfügbar
                if (fieldValue !== rawFieldValue && fieldValue.includes('[')) {
                    // Extract source references from consolidated field
                    const sourceMatches = fieldValue.match(/\\[([^\\]]+)\\]/g);
                    if (sourceMatches) {
                        const sources = [...new Set(sourceMatches)].join(' ');
                        deduplicatedValue += ` ${sources}`;
                        html += `<p><strong>With Sources Added:</strong> "${deduplicatedValue}"</p>`;
                    }
                }
                
                if (deduplicatedValue.includes('Canada (') && deduplicatedValue.includes('Kanada (')) {
                    html += '<p style="color: green;">✅ SUCCESS: Deduplication working correctly!</p>';
                } else {
                    html += '<p style="color: red;">❌ FAILED: Deduplication not producing expected format</p>';
                }
                
            } else {
                html += '<p style="color: red;">❌ Deduplication conditions not met</p>';
                html += `<p>Condition 1 - rawFieldValue.includes(' / '): ${rawFieldValue.includes(' / ')}</p>`;
                html += `<p>Condition 2 - window.deduplicationEngine exists: ${!!window.deduplicationEngine}</p>`;
            }
            
            // Step 3: Direct engine test
            html += '<h3>3. Direct Engine Test</h3>';
            if (window.deduplicationEngine) {
                const directTest = window.deduplicationEngine.deduplicateValues("Canada / Kanada / Canada / Canada / Kanada", 'country');
                html += `<p><strong>Direct Engine Test:</strong> "${directTest}"</p>`;
                
                if (directTest.includes('Canada (') && directTest.includes('Kanada (')) {
                    html += '<p style="color: green;">✅ Engine itself works correctly</p>';
                } else {
                    html += '<p style="color: red;">❌ Engine has issues with synonym recognition</p>';
                }
            }
            
            debugDiv.innerHTML = html;
        }
        
        // Run debug when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(debugDeduplication, 500);
        });
    </script>
</body>
</html>
