<!DOCTYPE html>
<html>
<head>
    <title>Direct displayResults Test</title>
</head>
<body>
    <div id="results"></div>
    
    <script>
    // Mock functions that displayResults expects
    function createErrorHTML(title, message) {
        return `<div style="color: red;"><h3>${title}</h3><p>${message}</p></div>`;
    }
    
    function safeSetHTML(element, html) {
        element.innerHTML = html;
    }
    
    function sanitizeHTML(text) {
        return text;
    }
    
    // Mock the simple display function
    function displaySimpleMultiModelResults(successfulResults, fullData) {
        console.log('🔧 [SIMPLE] Called with:', successfulResults.length, 'results');
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = `
            <div style="background: #f0fdf4; padding: 15px; border: 1px solid #10b981;">
                <h3>✅ Multi-Model Results (Simple Display)</h3>
                <p>${successfulResults.length} successful models</p>
                ${successfulResults.map(r => `<div>🤖 ${r.model_id}</div>`).join('')}
            </div>
        `;
    }
    
    // The actual displayResults function with debug logs
    function displayResults(data) {
        console.log('📊 [RESULTS] Displaying search results');
        
        // CRITICAL DEBUG: Log exact data structure
        console.log('🔍 [DEBUG] Data structure analysis:');
        console.log('  data exists:', !!data);
        console.log('  data.success:', data?.success);
        console.log('  data.data exists:', !!data?.data);
        console.log('  data.data.results exists:', !!data?.data?.results);
        console.log('  data.data.results is array:', Array.isArray(data?.data?.results));
        console.log('  data keys:', data ? Object.keys(data) : 'no data');
        if (data?.data) {
            console.log('  data.data keys:', Object.keys(data.data));
        }
        
        const resultsDiv = document.getElementById('results');
        if (!resultsDiv) {
            console.error('❌ [RESULTS] Results div not found');
            return;
        }
        
        if (!data) {
            console.warn('⚠️ [RESULTS] No data provided');
            resultsDiv.innerHTML = createErrorHTML('Keine Daten', 'Keine Suchergebnisse erhalten');
            return;
        }
        
        try {
            console.log('🔄 [LOGIC] Checking multi-model detection...');
            
            // PHASE 4: MULTI-MODEL COMPARISON DETECTION
            if (data.data && data.data.results && Array.isArray(data.data.results)) {
                console.log('🔬 [PHASE 4] Multi-model results detected');
                
                const successfulResults = data.data.results.filter(r => r.success && r.data);
                console.log('🔍 [FILTER] Successful results:', successfulResults.length);
                
                if (successfulResults.length >= 2) {
                    console.log('🔬 [PHASE 4] Interactive comparison for', successfulResults.length, 'models');
                    // Mock comparison
                    console.log('⚠️ [MOCK] Using simple display instead of comparison');
                    displaySimpleMultiModelResults(successfulResults, data.data);
                    return;
                } else if (successfulResults.length === 1) {
                    console.log('📊 [PHASE 3] Single successful model from multi-search');
                    resultsDiv.innerHTML = '<div>✅ Single model result (would call displaySingleModelFromMulti)</div>';
                    return;
                } else {
                    console.log('❌ [RESULTS] No successful models in multi-search');
                    resultsDiv.innerHTML = '<div>❌ No successful models</div>';
                    return;
                }
            }
            
            console.log('🔄 [LOGIC] Checking single model results...');
            
            // PHASE 3: SINGLE MODEL RESULTS
            if (data.success && data.data) {
                console.log('✅ [RESULTS] Displaying single model results');
                resultsDiv.innerHTML = '<div>✅ Single model success</div>';
            } else {
                // Error case
                console.warn('⚠️ [RESULTS] Displaying error results');
                console.log('  data.success:', data.success);
                console.log('  data.error:', data.error);
                
                const errorHTML = `
                    <div style="padding: 20px; background: #fef2f2; border-radius: 8px; border: 1px solid #f87171;">
                        <h3 style="color: #dc2626; margin: 0 0 10px 0;">❌ Suchergebnis fehlgeschlagen</h3>
                        <p style="color: #7f1d1d; margin-bottom: 15px;">${data.error || 'Unbekannter Fehler'}</p>
                    </div>
                `;
                
                resultsDiv.innerHTML = errorHTML;
            }
            
        } catch (error) {
            console.error('❌ [RESULTS] Error displaying results:', error);
            resultsDiv.innerHTML = createErrorHTML('Anzeigefehler', `Fehler beim Anzeigen der Ergebnisse: ${error.message}`);
        }
    }
    
    // Test with the exact API response structure we observed
    setTimeout(() => {
        console.log('🧪 [TEST] Starting direct displayResults test...');
        
        const mockApiResponse = {
            "success": true,
            "data": {
                "results": [
                    {
                        "model_id": "perplexity:sonar-pro",
                        "success": true,
                        "data": {
                            "structured_data": {
                                "Name": "Test Mine",
                                "Country": "Canada",
                                "Region": "Quebec"
                            },
                            "raw_content": "Test content..."
                        },
                        "sources": ["https://example.com"],
                        "search_duration": 15000
                    },
                    {
                        "model_id": "openrouter:deepseek-free",
                        "success": true,
                        "data": {
                            "structured_data": {
                                "Name": "Test Mine",
                                "Country": "Canada",
                                "Commodity": "Gold"
                            },
                            "raw_content": "Test content 2..."
                        },
                        "sources": ["https://example2.com"],
                        "search_duration": 12000
                    },
                    {
                        "model_id": "abacus:deep-agent",
                        "success": false,
                        "error": "API Fehler: 404 - Not Found"
                    }
                ],
                "total_models": 3,
                "successful_models": 2,
                "search_query": "Test Mine, Canada"
            },
            "timestamp": "2025-08-13T15:05:00.000Z"
        };
        
        console.log('🔬 [TEST] Calling displayResults with mock data...');
        displayResults(mockApiResponse);
        
    }, 1000);
    </script>
</body>
</html>
